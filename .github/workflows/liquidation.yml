name: Liquidation Engine Worker

on:
  schedule:
    - cron: '*/10 * * * *' # Ejecución cada 10 minutos
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions en GitHub

jobs:
  liquidate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install yfinance supabase pandas

      - name: Ejecutar Motor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python engine_worker.py